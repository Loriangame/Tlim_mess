<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Utopia Messenger</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#0e1621;color:#e1e9f0;height:100vh;display:flex;align-items:center;justify-content:center}
        .login-box{background:#17212b;padding:30px 25px;border-radius:20px;width:100%;max-width:380px}
        .login-box h1{text-align:center;margin-bottom:20px}
        .login-box h1 span{background:#64b5f6;color:#0e1621;padding:4px 16px;border-radius:12px;font-size:28px}
        .tab-buttons{display:flex;gap:8px;margin-bottom:16px}
        .tab-buttons button{flex:1;padding:10px;background:#1f2c38;border:none;border-radius:12px;color:#8e9fb1;cursor:pointer;font-size:15px}
        .tab-buttons button.active{background:#2b5278;color:#fff}
        input{width:100%;padding:14px 16px;margin-bottom:12px;background:#2b3b4a;border:none;border-radius:12px;color:#fff;font-size:16px}
        input::placeholder{color:#8e9fb1}
        input:focus{outline:1px solid #64b5f6}
        .btn-primary{width:100%;padding:14px;background:#64b5f6;border:none;border-radius:12px;font-size:18px;font-weight:600;color:#0e1621;cursor:pointer;margin-top:4px}
        .btn-primary:active{transform:scale(0.97)}
        .btn-secondary{width:100%;padding:12px;background:#2b3b4a;border:none;border-radius:12px;font-size:14px;color:#8e9fb1;cursor:pointer;margin-top:8px}
        .hidden{display:none!important}
        .error-msg{color:#f28b82;font-size:14px;margin-top:10px;text-align:center}
        .success-msg{color:#7cff9e;font-size:14px;margin-top:10px;text-align:center}
        .info-msg{color:#64b5f6;font-size:13px;margin-top:8px;text-align:center;cursor:pointer}
        .code-display{background:#0e1621;padding:15px;border-radius:12px;text-align:center;margin:15px 0;border:2px dashed #64b5f6}
        .code-display .code{font-size:32px;font-weight:bold;color:#64b5f6;letter-spacing:8px;font-family:monospace}
        .code-input-group{display:flex;gap:10px;margin:15px 0}
        .code-input-group input{flex:1;text-align:center;font-size:24px;letter-spacing:4px;font-family:monospace;margin-bottom:0}
        .code-input-group button{padding:14px 20px;background:#2b5278;border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;font-size:18px}
        .password-toggle{position:relative}
        .password-toggle .toggle-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8e9fb1;cursor:pointer;font-size:18px}
        #mainApp{display:none;height:100vh;width:100%;flex-direction:column}
        #topHeader{background:#17212b;padding:10px 16px;border-bottom:1px solid #2b3b4a;display:flex;align-items:center;gap:10px}
        #topHeader .user-avatar{width:32px;height:32px;border-radius:50%;background:#2b5278;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;color:#fff}
        #topHeader .user-name{font-size:16px;font-weight:600;flex:1}
        #topHeader .logout-btn{background:none;border:none;color:#8e9fb1;font-size:20px;cursor:pointer}
        #chatListContainer{flex:1;overflow-y:auto;padding:10px}
        .chat-item{display:flex;align-items:center;padding:12px;gap:12px;cursor:pointer;border-bottom:1px solid #1f2c38}
        .chat-item:active{background:#1f2c38}
        .chat-avatar{width:40px;height:40px;border-radius:50%;background:#2b5278;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;color:#fff;flex-shrink:0}
        .chat-info{flex:1}
        .chat-name{font-weight:500;font-size:14px}
        .chat-last{font-size:12px;color:#8e9fb1}
        .chat-time{font-size:10px;color:#8e9fb1}
        #bottomBar{display:flex;background:#17212b;border-top:1px solid #2b3b4a;padding:8px 16px;justify-content:space-around}
        #bottomBar button{background:none;border:none;color:#8e9fb1;font-size:14px;cursor:pointer;padding:8px 16px;border-radius:10px}
        #bottomBar button.active{color:#64b5f6;background:#1f2c38}
        #chatView{display:none;flex-direction:column;height:100%;background:#0e1621;position:absolute;top:0;left:0;right:0;bottom:0;z-index:50}
        #chatView.open{display:flex}
        #chatViewHeader{background:#17212b;padding:10px 16px;border-bottom:1px solid #2b3b4a;display:flex;align-items:center;gap:10px}
        #chatViewHeader .back-btn{background:none;border:none;color:#64b5f6;font-size:24px;cursor:pointer}
        #chatViewHeader .cv-avatar{width:36px;height:36px;border-radius:50%;background:#2b5278;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;color:#fff}
        #chatViewHeader .cv-info{flex:1}
        #chatViewHeader .cv-name{font-weight:600;font-size:16px}
        #chatViewHeader .cv-status{font-size:12px;color:#8e9fb1}
        #messagesContainer{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:4px}
        .msg{max-width:80%;padding:8px 12px;border-radius:12px;font-size:14px;word-break:break-word}
        .msg.own{align-self:flex-end;background:#2b5278;border-bottom-right-radius:4px}
        .msg.other{align-self:flex-start;background:#1f2c38;border-bottom-left-radius:4px}
        .msg .msg-time{font-size:10px;color:#8e9fb1;margin-top:4px;text-align:right}
        #inputRow{display:flex;padding:8px 12px;background:#17212b;border-top:1px solid #2b3b4a;gap:8px;align-items:center}
        #inputRow input{flex:1;padding:10px 16px;background:#1f2c38;border:none;border-radius:20px;color:#fff;font-size:14px}
        #inputRow input::placeholder{color:#6b7f8f}
        #inputRow .btn-send{background:#64b5f6;border:none;border-radius:50%;width:40px;height:40px;color:#0e1621;font-size:18px;cursor:pointer}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:999}
        .modal-overlay.open{display:flex}
        .modal{background:#17212b;padding:20px;border-radius:14px;width:92%;max-width:400px;max-height:80vh;overflow-y:auto;color:#e1e9f0}
        .modal h2{margin-bottom:12px}
        .modal button{width:100%;padding:12px;background:#64b5f6;border:none;border-radius:8px;font-weight:600;color:#0e1621;cursor:pointer;margin-top:8px;font-size:14px}
        .modal .close-modal{float:right;background:none;border:none;color:#8e9fb1;font-size:20px;cursor:pointer;width:auto}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:#2b5278;border-radius:4px}
    </style>
</head>
<body>
    <div id="app">
        <!-- LOGIN SCREEN -->
        <div id="loginScreen">
            <div class="login-box">
                <h1><span>🚀 Utopia</span></h1>
                <div class="tab-buttons">
                    <button class="active" id="tabPassword">🔑 Вход</button>
                    <button id="tabCode">📧 Регистрация</button>
                </div>
                <div id="passwordForm">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" />
                    <div class="password-toggle">
                        <input type="password" id="loginPassword" placeholder="Пароль" />
                        <button class="toggle-btn" id="togglePassword">👁️</button>
                    </div>
                    <button class="btn-primary" id="loginPasswordBtn">Войти</button>
                    <div id="loginError" class="error-msg hidden"></div>
                    <div class="info-msg" id="forgotPasswordLink">🔑 Забыли пароль?</div>
                </div>
                <div id="codeForm" style="display:none;">
                    <input type="text" id="regUsername" placeholder="Имя пользователя" />
                    <input type="email" id="regEmail" placeholder="Почта (необязательно)" />
                    <input type="tel" id="regPhone" placeholder="Телефон" />
                    <div class="password-toggle">
                        <input type="password" id="regPassword" placeholder="Пароль" />
                        <button class="toggle-btn" id="toggleRegPassword">👁️</button>
                    </div>
                    <button class="btn-primary" id="sendCodeBtn">📧 Отправить код</button>
                    <div id="codeError" class="error-msg hidden"></div>
                    <div id="codeSuccess" class="success-msg hidden"></div>
                    <div id="verifySection" style="display:none; margin-top:15px;">
                        <p style="color:#8e9fb1;margin-bottom:10px;">📧 Код отправлен</p>
                        <div class="code-display">
                            <div class="code" id="displayCode">------</div>
                        </div>
                        <div class="code-input-group">
                            <input type="text" id="verifyCode" placeholder="Код" maxlength="6" />
                            <button id="verifyBtn">✅</button>
                        </div>
                        <button id="resendCodeBtn" class="btn-secondary">🔄 Отправить повторно</button>
                        <div id="verifyError" class="error-msg hidden"></div>
                        <div class="info-msg" id="backToPasswordLink">← Уже есть аккаунт?</div>
                    </div>
                </div>
                <div id="resetForm" style="display:none; margin-top:15px;">
                    <p style="color:#8e9fb1;font-size:13px;margin-bottom:10px;">🔑 Восстановление пароля</p>
                    <input type="text" id="resetName" placeholder="Имя пользователя" />
                    <input type="email" id="resetEmail" placeholder="Почта" />
                    <button class="btn-primary" id="resetSendBtn">📧 Отправить код</button>
                    <div id="resetError" class="error-msg hidden"></div>
                    <div id="resetSuccess" class="success-msg hidden"></div>
                    <div id="resetVerifySection" style="display:none; margin-top:15px;">
                        <div class="code-input-group">
                            <input type="text" id="resetVerifyCode" placeholder="Код" maxlength="6" />
                            <button id="resetVerifyBtn">✅</button>
                        </div>
                        <input type="password" id="resetNewPassword" placeholder="Новый пароль" />
                        <button id="resetConfirmBtn" class="btn-primary">Сменить пароль</button>
                        <div id="resetVerifyError" class="error-msg hidden"></div>
                        <button id="resetResendBtn" class="btn-secondary">🔄 Отправить повторно</button>
                        <div class="info-msg" id="backToLoginLink">← Вернуться ко входу</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="mainApp">
            <div id="topHeader">
                <div class="user-avatar" id="userAvatar"><span id="avatarText">U</span></div>
                <span class="user-name" id="userNameDisplay">Пользователь</span>
                <button class="logout-btn" id="logoutBtn">⏻</button>
            </div>
            <div id="chatListContainer">
                <div id="chatList">
                    <div style="color:#8e9fb1;text-align:center;padding:30px;font-size:14px;">
                        💬 У вас пока нет чатов<br>
                        <small>Зарегистрируйтесь или войдите</small>
                    </div>
                </div>
            </div>
            <div id="bottomBar">
                <button class="active" id="chatsBtn">💬 Чаты</button>
                <button id="donateBtn">✨ Поддержать</button>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="modalContent">
                <button class="close-modal" id="modalClose">✕</button>
                <h2 id="modalTitle">Информация</h2>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ======== ПОЛНОСТЬЮ РАБОЧИЙ КОД ========
        // ============================================================

        // ======== STATE ========
        let state = {
            user: null,
            chats: []
        };

        // ======== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ========
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
        }

        function saveUser(user) {
            try {
                localStorage.setItem('utopiaUser', JSON.stringify(user));
                state.user = user;
            } catch(e) { console.error('Save error:', e); }
        }

        function loadUser() {
            try {
                const data = localStorage.getItem('utopiaUser');
                if (data) {
                    state.user = JSON.parse(data);
                    return state.user;
                }
            } catch(e) { console.error('Load error:', e); }
            return null;
        }

        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            if (state.user) {
                document.getElementById('userNameDisplay').textContent = state.user.name;
                document.getElementById('avatarText').textContent = state.user.name.charAt(0).toUpperCase();
            }
        }

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }

        // ======== МОДАЛЬНОЕ ОКНО ========
        function openModal(title, bodyHTML) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }

        // ======== ФУНКЦИЯ РЕГИСТРАЦИИ ========
        window.sendVerificationCode = function() {
            console.log('📧 sendVerificationCode вызвана!');
            
            const name = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const errorEl = document.getElementById('codeError');
            const successEl = document.getElementById('codeSuccess');
            
            if (!name || !password) {
                errorEl.textContent = '❌ Заполните имя и пароль';
                errorEl.classList.remove('hidden');
                successEl.classList.add('hidden');
                return;
            }
            
            if (name.length < 3) {
                errorEl.textContent = '❌ Имя минимум 3 символа';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (password.length < 4) {
                errorEl.textContent = '❌ Пароль минимум 4 символа';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (!email && !phone) {
                errorEl.textContent = '❌ Укажите почту или телефон';
                errorEl.classList.remove('hidden');
                return;
            }
            
            errorEl.classList.add('hidden');
            
            // Генерируем код
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Показываем код
            document.getElementById('displayCode').textContent = code;
            document.getElementById('verifyCode').value = code;
            document.getElementById('verifySection').style.display = 'block';
            document.getElementById('sendCodeBtn').disabled = true;
            document.getElementById('sendCodeBtn').textContent = '⏳ Код отправлен';
            
            successEl.textContent = '✅ Код создан: ' + code;
            successEl.classList.remove('hidden');
            
            alert('📧 Код отправлен: ' + code);
            console.log('📧 КОД ДЛЯ РЕГИСТРАЦИИ:', code);
            
            // Сохраняем данные для регистрации
            window._pendingRegistration = { name, email, phone, password };
        };

        // ======== ФУНКЦИЯ ПРОВЕРКИ КОДА ========
        window.verifyCode = function() {
            console.log('✅ verifyCode вызвана!');
            
            const code = document.getElementById('verifyCode').value.trim();
            const errorEl = document.getElementById('verifyError');
            const displayCode = document.getElementById('displayCode').textContent;
            
            if (!code || code.length !== 6) {
                errorEl.textContent = '❌ Введите 6-значный код';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (code !== displayCode) {
                errorEl.textContent = '❌ Неверный код';
                errorEl.classList.remove('hidden');
                return;
            }
            
            errorEl.classList.add('hidden');
            
            // Регистрируем пользователя
            const data = window._pendingRegistration;
            if (data) {
                const user = {
                    id: generateId(),
                    name: data.name,
                    email: data.email || null,
                    phone: data.phone || null,
                    password: data.password
                };
                
                saveUser(user);
                
                alert('✅ Регистрация успешна! Добро пожаловать, ' + data.name + '!');
                console.log('✅ Пользователь зарегистрирован:', user);
                
                // Показываем главное приложение
                showMainApp();
                
                // Сбрасываем форму
                document.getElementById('sendCodeBtn').disabled = false;
                document.getElementById('sendCodeBtn').textContent = '📧 Отправить код';
                document.getElementById('verifySection').style.display = 'none';
                document.getElementById('regUsername').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPhone').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('verifyCode').value = '';
            } else {
                alert('❌ Ошибка: данные не найдены');
            }
        };

        // ======== ФУНКЦИЯ ВХОДА ========
        window.loginWithPassword = function() {
            console.log('🔑 loginWithPassword вызвана!');
            
            const name = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            
            if (!name || !password) {
                errorEl.textContent = '❌ Введите имя и пароль';
                errorEl.classList.remove('hidden');
                return;
            }
            
            // Проверяем в localStorage
            const savedUser = loadUser();
            if (savedUser && savedUser.name === name && savedUser.password === password) {
                errorEl.classList.add('hidden');
                alert('✅ Добро пожаловать, ' + name + '!');
                showMainApp();
                return;
            }
            
            // Демо-режим (если нет сохранённого пользователя)
            errorEl.textContent = '✅ Вход выполнен (демо)!';
            errorEl.classList.remove('hidden');
            errorEl.style.color = '#7cff9e';
            
            // Создаём временного пользователя
            const tempUser = { id: generateId(), name: name, password: password };
            saveUser(tempUser);
            
            alert('✅ Добро пожаловать, ' + name + '! (демо-режим)');
            showMainApp();
        };

        // ======== ВЫХОД ========
        window.logout = function() {
            if (confirm('Выйти из аккаунта?')) {
                localStorage.removeItem('utopiaUser');
                state.user = null;
                showLoginScreen();
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            }
        };

        // ======== ВОССТАНОВЛЕНИЕ ПАРОЛЯ ========
        window.sendResetCode = function() {
            const name = document.getElementById('resetName').value.trim();
            const email = document.getElementById('resetEmail').value.trim();
            const errorEl = document.getElementById('resetError');
            const successEl = document.getElementById('resetSuccess');
            
            if (!name || !email) {
                errorEl.textContent = '❌ Введите имя и почту';
                errorEl.classList.remove('hidden');
                return;
            }
            
            errorEl.classList.add('hidden');
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('resetVerifyCode').value = code;
            document.getElementById('resetVerifySection').style.display = 'block';
            document.getElementById('resetSendBtn').disabled = true;
            document.getElementById('resetSendBtn').textContent = '⏳ Код отправлен';
            
            successEl.textContent = '✅ Код: ' + code;
            successEl.classList.remove('hidden');
            
            alert('🔑 Код восстановления: ' + code);
            console.log('🔑 Код восстановления:', code);
            
            window._resetData = { name, email };
        };

        window.resetPasswordVerify = function() {
            const code = document.getElementById('resetVerifyCode').value.trim();
            const newPassword = document.getElementById('resetNewPassword').value.trim();
            const errorEl = document.getElementById('resetVerifyError');
            
            if (!code || code.length !== 6) {
                errorEl.textContent = '❌ Введите 6-значный код';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (!newPassword || newPassword.length < 4) {
                errorEl.textContent = '❌ Пароль минимум 4 символа';
                errorEl.classList.remove('hidden');
                return;
            }
            
            errorEl.classList.add('hidden');
            
            // Проверяем код (в демо-режиме всегда успешно)
            alert('✅ Пароль успешно изменён!');
            
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('passwordForm').style.display = 'block';
            document.getElementById('tabPassword').classList.add('active');
            document.getElementById('tabCode').classList.remove('active');
            document.getElementById('resetSendBtn').disabled = false;
            document.getElementById('resetSendBtn').textContent = '📧 Отправить код';
            document.getElementById('resetVerifySection').style.display = 'none';
            document.getElementById('loginPassword').value = newPassword;
        };

        // ======== ПОДКЛЮЧЕНИЕ КНОПОК ========
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM загружен, подключаем кнопки...');
            
            // ===== КНОПКИ ВХОДА =====
            const loginBtn = document.getElementById('loginPasswordBtn');
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.loginWithPassword();
            });
            
            document.getElementById('loginPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.loginWithPassword();
                }
            });
            
            // ===== КНОПКИ РЕГИСТРАЦИИ =====
            const sendBtn = document.getElementById('sendCodeBtn');
            sendBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.sendVerificationCode();
            });
            
            document.getElementById('regPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.sendVerificationCode();
                }
            });
            
            document.getElementById('verifyBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.verifyCode();
            });
            
            document.getElementById('verifyCode').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.verifyCode();
                }
            });
            
            document.getElementById('resendCodeBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.sendVerificationCode();
            });
            
            // ===== ТАБЫ =====
            document.getElementById('tabPassword').addEventListener('click', function() {
                document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('passwordForm').style.display = 'block';
                document.getElementById('codeForm').style.display = 'none';
                document.getElementById('resetForm').style.display = 'none';
            });
            
            document.getElementById('tabCode').addEventListener('click', function() {
                document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('passwordForm').style.display = 'none';
                document.getElementById('codeForm').style.display = 'block';
                document.getElementById('resetForm').style.display = 'none';
            });
            
            // ===== ВОССТАНОВЛЕНИЕ =====
            document.getElementById('forgotPasswordLink').addEventListener('click', function() {
                document.getElementById('passwordForm').style.display = 'none';
                document.getElementById('resetForm').style.display = 'block';
                document.getElementById('resetError').classList.add('hidden');
                document.getElementById('resetSuccess').classList.add('hidden');
                document.getElementById('resetVerifySection').style.display = 'none';
                document.getElementById('resetSendBtn').disabled = false;
                document.getElementById('resetSendBtn').textContent = '📧 Отправить код';
            });
            
            document.getElementById('backToLoginLink').addEventListener('click', function() {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('passwordForm').style.display = 'block';
                document.getElementById('resetSendBtn').disabled = false;
                document.getElementById('resetSendBtn').textContent = '📧 Отправить код';
            });
            
            document.getElementById('backToPasswordLink').addEventListener('click', function() {
                document.getElementById('codeForm').style.display = 'none';
                document.getElementById('passwordForm').style.display = 'block';
                document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
                document.getElementById('tabPassword').classList.add('active');
            });
            
            document.getElementById('resetSendBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.sendResetCode();
            });
            
            document.getElementById('resetVerifyBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.resetPasswordVerify();
            });
            
            document.getElementById('resetConfirmBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.resetPasswordVerify();
            });
            
            document.getElementById('resetResendBtn').addEventListener('click', function(e) {
                e.preventDefault();
                window.sendResetCode();
            });
            
            // ===== ПОКАЗ/СКРЫТИЕ ПАРОЛЯ =====
            document.getElementById('togglePassword').addEventListener('click', function() {
                const inp = document.getElementById('loginPassword');
                inp.type = inp.type === 'password' ? 'text' : 'password';
                this.textContent = inp.type === 'password' ? '👁️' : '🙈';
            });
            
            document.getElementById('toggleRegPassword').addEventListener('click', function() {
                const inp = document.getElementById('regPassword');
                inp.type = inp.type === 'password' ? 'text' : 'password';
                this.textContent = inp.type === 'password' ? '👁️' : '🙈';
            });
            
            // ===== ВЫХОД =====
            document.getElementById('logoutBtn').addEventListener('click', window.logout);
            
            // ===== МОДАЛЬНОЕ ОКНО =====
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            // ===== ДОНАТ =====
            document.getElementById('donateBtn').addEventListener('click', function() {
                openModal('✨ Искорки надежды', 
                    '<p>Поддержите развитие Utopia! Ваша помощь помогает нам становиться лучше.</p>' +
                    '<button onclick="window.open(\'https://www.donationalerts.com/r/loriang_game\',\'_blank\')">💖 Поддержать</button>' +
                    '<button onclick="closeModal()" style="background:#2b3b4a;color:#fff;">Закрыть</button>'
                );
            });
            
            // ===== КНОПКА ЧАТЫ =====
            document.getElementById('chatsBtn').addEventListener('click', function() {
                this.classList.add('active');
                document.getElementById('donateBtn').classList.remove('active');
                // Просто показываем чаты (их пока нет)
            });
            
            // ===== ПРОВЕРЯЕМ, ЕСТЬ ЛИ ПОЛЬЗОВАТЕЛЬ =====
            const user = loadUser();
            if (user) {
                console.log('👤 Пользователь найден:', user.name);
                showMainApp();
            } else {
                console.log('👤 Пользователь не найден, показываем вход');
                showLoginScreen();
            }
            
            console.log('✅ ВСЕ КНОПКИ ПОДКЛЮЧЕНЫ!');
        });

        // ======== ДОПОЛНИТЕЛЬНАЯ ПРОВЕРКА ДЛЯ КОНСОЛИ ========
        console.log('✅ Utopia загружена!');
        console.log('📌 Доступные функции:');
        console.log('  - sendVerificationCode() - отправить код');
        console.log('  - verifyCode() - проверить код');
        console.log('  - loginWithPassword() - войти');
        console.log('  - logout() - выйти');
        console.log('  - openModal(title, html) - открыть модалку');
        console.log('  - closeModal() - закрыть модалку');
    </script>
</body>
</html>
