<script>
// ======== STATE ========
let state = {
    user: null, chats: [], folders: [], folderChats: {}, currentFolderFilter: null,
    currentChatId: null, allUsers: [], blockedUsers: [],
    bot: null, botChatId: null, pendingFile: null, mediaRecorder: null, audioChunks: [],
    isRecording: false, recordingTimer: null, recordingSeconds: 0,
    circleStream: null, circleRecorder: null, circleChunks: [], circleTimer: null, circleSeconds: 0,
    pendingVerification: null, resetPending: null, stickers: [],
    lastMessageCount: {}, deletedChatIds: new Set(), replyToMsg: null,
    callParticipants: [], pendingCallData: null
};
let circleAudioContext = null;
let ws = null, wsConnected = false, wsReconnectAttempts = 0;
const MAX_RECONNECT_ATTEMPTS = 3;

// ======== HELPERS ========
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 6); }
function getChat(id) { return state.chats.find(c => c.id === id); }
function getUserName(id) { if(id==='bot')return'Bot';if(id==='system')return'Система';const u=state.allUsers.find(a=>a.id===id);return u?u.name:id; }
function formatTime(ts) { const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function formatDuration(s) { const m=Math.floor(s/60); const sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
function isUserBlocked(name) { return state.blockedUsers.some(b=>b.toLowerCase()===name.toLowerCase()); }
function isChatBlocked(id) { const c=getChat(id); return c&&c.isBlocked; }
function formatFileSize(b) { if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function getFileIcon(fn) { const e=fn.split('.').pop().toLowerCase(); const icons={'pdf':'📄','doc':'📄','txt':'📄','xls':'📊','csv':'📊','zip':'📦','rar':'📦','jpg':'🖼️','jpeg':'🖼️','png':'🖼️','gif':'🖼️','webp':'🖼️','mp3':'🎵','wav':'🎵','mp4':'🎬','avi':'🎬','mkv':'🎬','exe':'⚙️','apk':'📱','json':'📋','html':'📋','css':'📋','js':'📋'}; return icons[e]||'📎'; }
function getChatName(chat) { let n=chat.name; if(chat.type==='chat'&&chat.participants&&chat.participants.length===2){const o=chat.participants.find(id=>id!==state.user?.id);if(o){const u=state.allUsers.find(a=>a.id===o);if(u)n=u.name;}} if(chat.type==='channel')n='📢 '+n; else if(chat.type==='group')n='👥 '+n; else if(chat.isBot)n='🤖 '+n; if(chat.isPrivate)n=n+' 🔒'; if(chat.isBlocked)n=n+' 🚫'; return n; }

// ======== СТИКЕРЫ ========
function loadStickers(){try{const s=localStorage.getItem('utopiaStickers');if(s&&JSON.parse(s).length>0)state.stickers=JSON.parse(s);else{state.stickers=['😊','😂','😍','😎','🔥','❤️','💪','🌟','🎉','💯'];saveStickers();}}catch(e){state.stickers=['😊','😂','😍','😎','🔥','❤️','💪','🌟','🎉','💯'];saveStickers();}}
function saveStickers(){try{localStorage.setItem('utopiaStickers',JSON.stringify(state.stickers));}catch(e){}}

function renderStickers() {
    const panel=document.getElementById('stickerPanel');
    if(!state.stickers||state.stickers.length===0){panel.innerHTML='<div style="color:#8e9fb1;font-size:12px;padding:8px;width:100%;text-align:center;">Нет стикеров. Нажмите +</div><div class="sticker-add" id="addStickerBtn">➕</div>';document.getElementById('addStickerBtn')?.addEventListener('click',()=>{document.getElementById('stickerInput').click();});return;}
    panel.innerHTML=state.stickers.map((s,i)=>`<div class="sticker" data-index="${i}" title="${s}">${s}</div>`).join('')+'<div class="sticker-add" id="addStickerBtn">➕</div>';
    panel.querySelectorAll('.sticker').forEach(el=>{el.addEventListener('click',()=>{const idx=parseInt(el.dataset.index);const sticker=state.stickers[idx];if(sticker){const chat=getChat(state.currentChatId);if(chat){const msg={id:generateId(),sender:state.user.id,text:sticker,isSticker:true,stickerData:sticker,replyTo:state.replyToMsg||null,time:Date.now()};chat.messages.push(msg);renderMessages();renderChatList();saveState();clearReplyBar();if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'new_message',chatId:chat.id,sender:state.user.id,msgId:msg.id,text:sticker,isSticker:true,replyTo:state.replyToMsg||null}));}}document.getElementById('stickerPanel').classList.remove('show');}});});
    document.getElementById('addStickerBtn')?.addEventListener('click',()=>{document.getElementById('stickerInput').click();});
}
document.getElementById('stickerInput')?.addEventListener('change',(e)=>{if(e.target.files.length){const file=e.target.files[0];if(!file.type.startsWith('image/')){alert('Выберите изображение');return;}const reader=new FileReader();reader.onload=(ev)=>{state.stickers.push(ev.target.result);saveStickers();renderStickers();alert('✅ Стикер добавлен!');};reader.readAsDataURL(file);}e.target.value='';});

// ======== БОТ ========
class SimpleBot { constructor(){this.hasGreeted={};} setUserName(n){this.userName=n;} getResponse(msg,chatId){if(this.hasGreeted[chatId])return null;this.hasGreeted[chatId]=true;const name=this.userName||'Пользователь';return `Привет, ${name}! 👋 Я бот Utopia. Приятно познакомиться!`;}}

// ======== LOAD/SAVE ========
function loadState(){try{const su=localStorage.getItem('utopiaUser');const sb=localStorage.getItem('utopiaBlocked');if(sb)state.blockedUsers=JSON.parse(sb);loadStickers();if(su){state.user=JSON.parse(su);document.getElementById('userNameDisplay').textContent=state.user.name;if(state.user.avatar){document.getElementById('avatarText').textContent='';document.getElementById('userAvatar').innerHTML='<img src="'+state.user.avatar+'" alt="avatar" />';}else{document.getElementById('avatarText').textContent=state.user.name.charAt(0).toUpperCase();}return true;}return false;}catch(e){return false;}}
function saveState(){try{if(state.user){localStorage.setItem('utopiaUser',JSON.stringify({id:state.user.id,name:state.user.name,email:state.user.email,phone:state.user.phone,password:state.user.password,avatar:state.user.avatar||null}));}localStorage.setItem('utopiaBlocked',JSON.stringify(state.blockedUsers));saveStickers();}catch(e){}}

// ======== ПАПКИ ========
function saveFolders(){try{localStorage.setItem('utopiaFolders',JSON.stringify({folders:state.folders,folderChats:state.folderChats}));}catch(e){}}
function loadFolders(){try{const saved=localStorage.getItem('utopiaFolders');if(saved){const data=JSON.parse(saved);state.folders=data.folders||[];state.folderChats=data.folderChats||{};}else{state.folders=[{id:'favorites',name:'⭐ Избранное',icon:'⭐',color:'#f39c12'},{id:'work',name:'💼 Работа',icon:'💼',color:'#3498db'},{id:'personal',name:'👤 Личное',icon:'👤',color:'#2ecc71'}];state.folderChats={};saveFolders();}}catch(e){state.folders=[];state.folderChats={};}}
function createFolder(name,icon,color){const folder={id:generateId(),name:name||'Новая папка',icon:icon||'📁',color:color||'#64b5f6',created:Date.now()};state.folders.push(folder);state.folderChats[folder.id]=[];saveFolders();renderFolders();renderChatList();return folder;}
function deleteFolder(folderId){if(!confirm('Удалить папку? Чаты не будут удалены.'))return;state.folders=state.folders.filter(f=>f.id!==folderId);delete state.folderChats[folderId];saveFolders();renderFolders();renderChatList();}
function renameFolder(folderId){const folder=state.folders.find(f=>f.id===folderId);if(!folder)return;const newName=prompt('Новое имя папки:',folder.name);if(newName&&newName.trim()){folder.name=newName.trim();saveFolders();renderFolders();renderChatList();}}
function addChatToFolder(folderId,chatId){if(!state.folderChats[folderId])state.folderChats[folderId]=[];if(!state.folderChats[folderId].includes(chatId)){state.folderChats[folderId].push(chatId);saveFolders();renderFolders();renderChatList();}}
function removeChatFromFolder(folderId,chatId){if(state.folderChats[folderId]){state.folderChats[folderId]=state.folderChats[folderId].filter(id=>id!==chatId);saveFolders();renderFolders();renderChatList();}}
function showAllChats(){state.currentFolderFilter=null;renderChatList();renderFolders();}

function showCreateFolderModal(){openModal('📂 Создать папку','<div><label class="modal-label">Название</label><input type="text" id="folderNameInput" placeholder="Название папки..." /></div><div><label class="modal-label">Иконка</label><select id="folderIconSelect" style="width:100%;padding:8px;background:#1f2c38;border:none;border-radius:8px;color:#fff;font-size:16px;"><option value="📁">📁 Папка</option><option value="⭐">⭐ Избранное</option><option value="💼">💼 Работа</option><option value="👤">👤 Личное</option><option value="🎮">🎮 Игры</option><option value="📚">📚 Учёба</option><option value="🏠">🏠 Дом</option><option value="❤️">❤️ Любимое</option><option value="🔥">🔥 Важное</option><option value="💎">💎 Особое</option></select></div><div><label class="modal-label">Цвет</label><input type="color" id="folderColorInput" value="#64b5f6" style="width:100%;padding:4px;background:#1f2c38;border:none;border-radius:8px;cursor:pointer;" /></div><button class="btn-primary" id="createFolderConfirmBtn">✅ Создать</button><button class="btn-secondary" onclick="closeModal()">Отмена</button>');document.getElementById('createFolderConfirmBtn')?.addEventListener('click',()=>{const name=document.getElementById('folderNameInput').value.trim();const icon=document.getElementById('folderIconSelect').value;const color=document.getElementById('folderColorInput').value;if(!name){alert('Введите название');return;}createFolder(name,icon,color);closeModal();});}

function showAddToFolderMenu(chatId){const chat=getChat(chatId);if(!chat)return;let options=state.folders.map(f=>{const isInFolder=state.folderChats[f.id]?.includes(chatId);return `<button onclick="${isInFolder?`removeChatFromFolder('${f.id}','${chatId}')`:`addChatToFolder('${f.id}','${chatId}')`}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;width:100%;background:none;border:none;color:#e1e9f0;cursor:pointer;border-radius:6px;font-size:13px;text-align:left;"><span style="color:${f.color}">${f.icon}</span><span>${f.name}</span><span style="margin-left:auto;">${isInFolder?'✅':'➕'}</span></button>`;}).join('');openModal('📂 Добавить в папку','<p style="color:#8e9fb1;font-size:13px;margin-bottom:10px;">Чат: <strong>'+getChatName(chat)+'</strong></p><div style="display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;">'+(options||'<p style="color:#8e9fb1;font-size:13px;">Нет папок. Создайте папку через кнопку 📂 Папка</p>')+'</div><button class="btn-secondary" onclick="closeModal()">Закрыть</button>');}

function renderFolders(){const container=document.getElementById('foldersContainer');if(!container)return;const allChatsBar=document.getElementById('allChatsBar');if(allChatsBar){allChatsBar.style.display=state.currentFolderFilter?'block':'none';}if(!state.folders||state.folders.length===0){container.innerHTML='<div style="color:#8e9fb1;font-size:12px;padding:8px;text-align:center;">Нет папок</div><button class="create-folder-btn" onclick="showCreateFolderModal()" style="background:#2b5278;border:none;border-radius:8px;color:#fff;padding:6px 12px;cursor:pointer;font-size:11px;width:100%;">➕ Создать папку</button>';return;}let allChatsButton='';if(state.currentFolderFilter){allChatsButton='<div onclick="showAllChats()" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:0.2s;background:#2b5278;margin-bottom:4px;border-left:3px solid #64b5f6;"><span style="font-size:18px;">📂</span><span style="flex:1;font-size:13px;font-weight:500;color:#fff;">Все чаты</span><span style="font-size:11px;color:#8e9fb1;">✕</span></div>';}let foldersHtml=state.folders.map(folder=>{const count=(state.folderChats[folder.id]||[]).length;const isActive=state.currentFolderFilter===folder.id;return `<div class="folder-item" data-folder-id="${folder.id}" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:0.2s;background:${isActive?'#2b527844':folder.color+'22'};border-left:3px solid ${isActive?'#64b5f6':folder.color};margin-bottom:4px;"><span style="font-size:18px;">${folder.icon}</span><span style="flex:1;font-size:13px;font-weight:500;color:#e1e9f0;">${folder.name}</span><span style="font-size:11px;color:#8e9fb1;background:#0e1621;padding:0 8px;border-radius:10px;">${count}</span><button onclick="event.stopPropagation();renameFolder('${folder.id}')" style="background:none;border:none;color:#8e9fb1;cursor:pointer;font-size:12px;">✏️</button><button onclick="event.stopPropagation();deleteFolder('${folder.id}')" style="background:none;border:none;color:#f28b82;cursor:pointer;font-size:12px;">🗑️</button></div>`;}).join('');container.innerHTML=allChatsButton+foldersHtml+'<button class="create-folder-btn" onclick="showCreateFolderModal()" style="background:#2b5278;border:none;border-radius:8px;color:#fff;padding:6px 12px;cursor:pointer;font-size:11px;width:100%;margin-top:4px;">➕ Создать папку</button>';container.querySelectorAll('.folder-item').forEach(el=>{el.addEventListener('click',function(e){if(e.target.tagName==='BUTTON')return;const folderId=this.dataset.folderId;if(state.currentFolderFilter===folderId){state.currentFolderFilter=null;}else{state.currentFolderFilter=folderId;}renderChatList();renderFolders();});});}

// ======== ЗАГРУЗКА С СЕРВЕРА ========
async function fetchAllUsers(){try{const r=await fetch('/api/users',{cache:'no-cache',headers:{'Cache-Control':'no-cache'}});const u=await r.json();state.allUsers=u;return u;}catch(e){return state.allUsers||[];}}
async function loadChatsFromServer(){if(!state.user)return;try{const r=await fetch('/api/chats/'+state.user.id,{cache:'no-cache',headers:{'Cache-Control':'no-cache'}});const chats=await r.json();const filtered=chats.filter(c=>!state.deletedChatIds.has(c.id));const existingIds=new Set(state.chats.map(c=>c.id));for(const newChat of filtered){const existing=state.chats.find(c=>c.id===newChat.id);if(existing){if(newChat.name)existing.name=newChat.name;if(newChat.description!==undefined)existing.description=newChat.description;if(newChat.avatar)existing.avatar=newChat.avatar;if(newChat.participants)existing.participants=newChat.participants;if(!existing.pinnedMessages)existing.pinnedMessages=[];}else{state.chats.push(newChat);if(!newChat.pinnedMessages)newChat.pinnedMessages=[];}}for(let chat of state.chats){const msgs=await fetch('/api/messages/'+chat.id);chat.messages=await msgs.json();state.lastMessageCount[chat.id]=chat.messages.length;}return true;}catch(e){console.warn('Ошибка загрузки чатов:',e);return false;}}

// ======== WebSocket ========
function connectWebSocket(){if(!state.user)return;if(wsReconnectAttempts>=MAX_RECONNECT_ATTEMPTS)return;try{const protocol=window.location.protocol==='https:'?'wss:':'ws:';const wsUrl=protocol+'//'+window.location.host+'/ws';ws=new WebSocket(wsUrl);ws.onopen=()=>{wsConnected=true;wsReconnectAttempts=0;ws.send(JSON.stringify({type:'auth',userId:state.user.id}));};ws.onmessage=(e)=>{try{const data=JSON.parse(e.data);switch(data.type){case'new_message':{const chat=getChat(data.chatId);if(chat){const exists=chat.messages.some(m=>m.id===data.message.id);if(!exists){data.message._isNew=true;chat.messages.push(data.message);if(state.currentChatId===data.chatId){renderMessages();document.getElementById('messagesContainer').scrollTop=document.getElementById('messagesContainer').scrollHeight;}renderChatList();saveState();}}break;}case'typing':{const chat=getChat(data.chatId);if(chat&&state.currentChatId===data.chatId){const status=document.getElementById('cvStatus');if(data.isTyping){status.textContent='✍️ печатает...';clearTimeout(chat._typingTimeout);chat._typingTimeout=setTimeout(()=>{status.textContent='онлайн';},2000);}else{status.textContent='онлайн';}}break;}case'message_deleted':{const chat=getChat(data.chatId);if(chat){chat.messages=chat.messages.filter(m=>m.id!==data.msgId);if(chat.pinnedMessages)chat.pinnedMessages=chat.pinnedMessages.filter(id=>id!==data.msgId);if(state.currentChatId===data.chatId)renderMessages();renderChatList();saveState();}break;}case'chat_updated':{const chat=getChat(data.chatId);if(chat){if(data.chat){chat.name=data.chat.name||chat.name;chat.description=data.chat.description||chat.description;chat.avatar=data.chat.avatar||chat.avatar;chat.participants=data.chat.participants||chat.participants;}if(state.currentChatId===data.chatId){updateChatHeader();renderMessages();}renderChatList();saveState();}break;}case'call_offer':state.pendingCallData=data;showCallModal(data);break;case'call_answer':if(peerConnection){peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));document.getElementById('callStatus').textContent='📞 Соединение установлено';document.getElementById('callStatus').classList.remove('call-ringing');}break;case'ice_candidate':if(peerConnection){try{peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));}catch(e){}}break;case'call_end':document.getElementById('callStatus').textContent='📞 Звонок завершён';document.getElementById('callStatus').classList.remove('call-ringing');setTimeout(()=>{endCall();document.getElementById('callContainer').style.display='none';},1000);break;case'call_user_joined':addCallParticipant(data.userId);break;case'call_user_left':removeCallParticipant(data.userId);break;case'auth_success':console.log('✅ WebSocket авторизация успешна');break;}}catch(e){}};ws.onclose=()=>{wsConnected=false;setTimeout(()=>{wsReconnectAttempts++;connectWebSocket();},3000);};ws.onerror=()=>{wsConnected=false;};}catch(e){wsConnected=false;}}

// ======== ЗВОНКИ ========
const rtcConfig={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun2.l.google.com:19302'},{urls:'stun:stun3.l.google.com:19302'},{urls:'stun:stun4.l.google.com:19302'},{urls:'stun:stun.voip.blackberry.com:3478'},{urls:'stun:stun.ekiga.net:3478'},{urls:'stun:stun.stunprotocol.org:3478'},{urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},{urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},{urls:'turn:openrelay.metered.ca:5349',username:'openrelayproject',credential:'openrelayproject'}],iceTransportPolicy:'all',bundlePolicy:'max-bundle',rtcpMuxPolicy:'require',iceCandidatePoolSize:10};
let peerConnection=null,localStream=null,remoteStream=null,isInCall=false,callTarget=null,isVideoCall=false,isMicOn=true,isVideoOn=true,callRoomId=null,callTimeout=null,reconnectAttempts=0;

function createPeerConnection(targetUserId,isVideo){if(peerConnection){try{peerConnection.close();}catch(e){}peerConnection=null;}const pc=new RTCPeerConnection(rtcConfig);peerConnection=pc;pc.oniceconnectionstatechange=()=>{const status=document.getElementById('callStatus');switch(pc.iceConnectionState){case'checking':status.textContent='🔄 Проверка соединения...';break;case'connected':status.textContent='📞 Соединено';status.classList.remove('call-ringing');break;case'completed':status.textContent='📞 Соединение установлено';status.classList.remove('call-ringing');break;case'failed':status.textContent='❌ Соединение не удалось';handleConnectionFailed();break;case'disconnected':status.textContent='📞 Соединение потеряно';handleDisconnected();break;case'closed':status.textContent='📞 Соединение закрыто';break;}};pc.onconnectionstatechange=()=>{if(pc.connectionState==='failed')handleConnectionFailed();if(pc.connectionState==='connected'){document.getElementById('callStatus').textContent='📞 Разговор...';document.getElementById('callStatus').classList.remove('call-ringing');reconnectAttempts=0;}};if(localStream){localStream.getTracks().forEach(track=>{pc.addTrack(track,localStream);});}pc.ontrack=(event)=>{if(!remoteStream)remoteStream=new MediaStream();remoteStream.addTrack(event.track);if(event.track.kind==='video'){const remoteVideo=document.getElementById('remoteVideo');if(remoteVideo){remoteVideo.srcObject=remoteStream;remoteVideo.style.display=isVideo?'block':'none';remoteVideo.play().catch(e=>{});}}if(event.track.kind==='audio'){const remoteAudio=document.getElementById('remoteAudio');if(remoteAudio){remoteAudio.srcObject=remoteStream;remoteAudio.play().catch(e=>{});}}document.getElementById('callStatus').textContent='📞 Соединено';document.getElementById('callStatus').classList.remove('call-ringing');};pc.onicecandidate=(event)=>{if(event.candidate){if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'ice_candidate',targetUserId:targetUserId,candidate:event.candidate,roomId:callRoomId}));}}};pc.onicecandidateerror=(event)=>{console.error('❌ ICE ошибка:',event);};return pc;}

function handleConnectionFailed(){if(reconnectAttempts<MAX_RECONNECT_ATTEMPTS){reconnectAttempts++;document.getElementById('callStatus').textContent=`🔄 Переподключение... (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`;setTimeout(()=>{if(peerConnection){try{const isVideo=isVideoCall;const target=callTarget;endCall();startCall(target,isVideo);}catch(e){}}},2000);}else{document.getElementById('callStatus').textContent='❌ Не удалось подключиться';setTimeout(()=>{endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';},3000);}}
function handleDisconnected(){if(peerConnection&&peerConnection.iceConnectionState!=='closed'){setTimeout(()=>{try{peerConnection.restartIce();}catch(e){}},2000);}}

function addCallParticipant(userId){const container=document.getElementById('callParticipants');const name=getUserName(userId);if(container.querySelector(`[data-userid="${userId}"]`))return;const div=document.createElement('div');div.className='call-participant';div.dataset.userid=userId;div.innerHTML=`<div class="cp-avatar">${name.charAt(0).toUpperCase()}</div><div class="cp-name">${name}</div>`;container.appendChild(div);}
function removeCallParticipant(userId){const container=document.getElementById('callParticipants');const el=container.querySelector(`[data-userid="${userId}"]`);if(el)el.remove();}

async function startCall(targetUserId,isVideo){if(isInCall){alert('Уже в звонке');return;}callTarget=targetUserId;isVideoCall=isVideo;callRoomId=generateId();reconnectAttempts=0;const userName=getUserName(targetUserId);try{const constraints={audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:isVideo?{width:{ideal:640},height:{ideal:480},facingMode:'user'}:false};const stream=await navigator.mediaDevices.getUserMedia(constraints);localStream=stream;const localVideo=document.getElementById('localVideo');if(localVideo){localVideo.srcObject=stream;localVideo.style.display=isVideo?'block':'none';localVideo.play().catch(e=>{});}addCallParticipant(state.user.id);addCallParticipant(targetUserId);const pc=createPeerConnection(targetUserId,isVideo);const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:isVideo});await pc.setLocalDescription(offer);const chat=getChat(state.currentChatId);let participants=[];if(chat&&chat.type==='group'){participants=chat.participants.filter(id=>id!==state.user.id&&id!==targetUserId);}if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'call_offer',targetUserId:callTarget,offer:peerConnection.localDescription,isVideo:isVideoCall,roomId:callRoomId,participants:participants}));isInCall=true;document.getElementById('callContainer').style.display='flex';document.getElementById('callStatus').textContent=`📞 Звонок ${userName}...`;document.getElementById('callStatus').classList.add('call-ringing');document.getElementById('toggleMicBtn').textContent='🎤';document.getElementById('toggleVideoBtn').textContent=isVideo?'📹':'🚫';clearTimeout(callTimeout);callTimeout=setTimeout(()=>{if(isInCall&&peerConnection&&peerConnection.iceConnectionState==='new'){document.getElementById('callStatus').textContent='⏰ Звонок не принят';endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';alert('⏰ Звонок не был принят');}},45000);}else{alert('❌ Нет соединения с сервером');endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';}}catch(error){alert('❌ Не удалось начать звонок: '+error.message);endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';}}

async function answerCall(offer,fromUserId,isVideo){callTarget=fromUserId;isVideoCall=isVideo;callRoomId=generateId();reconnectAttempts=0;const userName=getUserName(fromUserId);try{const constraints={audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:isVideo?{width:{ideal:640},height:{ideal:480},facingMode:'user'}:false};const stream=await navigator.mediaDevices.getUserMedia(constraints);localStream=stream;const localVideo=document.getElementById('localVideo');if(localVideo){localVideo.srcObject=stream;localVideo.style.display=isVideo?'block':'none';localVideo.play().catch(e=>{});}addCallParticipant(state.user.id);addCallParticipant(fromUserId);const pc=createPeerConnection(fromUserId,isVideo);await pc.setRemoteDescription(new RTCSessionDescription(offer));const answer=await pc.createAnswer({offerToReceiveAudio:true,offerToReceiveVideo:isVideo});await pc.setLocalDescription(answer);if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'call_answer',targetUserId:callTarget,answer:peerConnection.localDescription,roomId:callRoomId}));isInCall=true;document.getElementById('callContainer').style.display='flex';document.getElementById('callStatus').textContent=`📞 Соединение с ${userName}...`;document.getElementById('callStatus').classList.add('call-ringing');document.getElementById('toggleMicBtn').textContent='🎤';document.getElementById('toggleVideoBtn').textContent=isVideo?'📹':'🚫';clearTimeout(callTimeout);callTimeout=setTimeout(()=>{if(isInCall&&peerConnection&&peerConnection.iceConnectionState==='new'){document.getElementById('callStatus').textContent='⏰ Соединение не установлено';endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';alert('⏰ Не удалось установить соединение');}},45000);}else{alert('❌ Нет соединения с сервером');endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';}}catch(error){alert('❌ Не удалось ответить: '+error.message);endCall();document.getElementById('callContainer').style.display='none';document.getElementById('callParticipants').innerHTML='';}}

function endCall(){clearTimeout(callTimeout);if(peerConnection){try{peerConnection.close();}catch(e){}peerConnection=null;}if(localStream){localStream.getTracks().forEach(t=>{try{t.stop();}catch(e){}});localStream=null;}remoteStream=null;isInCall=false;reconnectAttempts=0;document.getElementById('callParticipants').innerHTML='';if(callTarget&&wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'call_end',targetUserId:callTarget,roomId:callRoomId}));}callTarget=null;callRoomId=null;document.getElementById('callContainer').style.display='none';const localVideo=document.getElementById('localVideo');if(localVideo){localVideo.srcObject=null;localVideo.style.display='none';}const remoteVideo=document.getElementById('remoteVideo');if(remoteVideo){remoteVideo.srcObject=null;remoteVideo.style.display='none';}const remoteAudio=document.getElementById('remoteAudio');if(remoteAudio){remoteAudio.srcObject=null;}isVideoOn=true;isMicOn=true;document.getElementById('callStatus').classList.remove('call-ringing');state.pendingCallData=null;}

function toggleMic(){if(localStream){isMicOn=!isMicOn;localStream.getAudioTracks().forEach(t=>{t.enabled=isMicOn;});document.getElementById('toggleMicBtn').textContent=isMicOn?'🎤':'🔇';}}
function toggleVideo(){if(localStream){isVideoOn=!isVideoOn;localStream.getVideoTracks().forEach(t=>{t.enabled=isVideoOn;});document.getElementById('toggleVideoBtn').textContent=isVideoOn?'📹':'🚫';const localVideo=document.getElementById('localVideo');if(localVideo){localVideo.style.display=isVideoOn?'block':'none';}}}

function showCallModal(data){const userName=getUserName(data.from);const isVideo=data.isVideo||false;state.pendingCallData=data;playRingtone();if(document.hidden){sendPushNotification(data.from,data.roomId,isVideo);playRingtoneInBackground();}openModal('📞 Входящий звонок','<div style="text-align:center;padding:20px 0;"><div style="font-size:64px;margin-bottom:10px;animation:ring 1s ease-in-out infinite;">'+(isVideo?'🎥':'📞')+'</div><h3 style="color:#64b5f6;font-size:20px;">'+userName+'</h3><p style="color:#8e9fb1;font-size:14px;margin-top:4px;">'+(isVideo?'Видеозвонок':'Аудиозвонок')+'</p><div class="call-modal-buttons"><button id="callAcceptBtn" class="accept-call" title="Принять">✅</button><button id="callRejectBtn" class="reject-call" title="Отклонить">❌</button></div><p style="color:#8e9fb1;font-size:11px;margin-top:12px;">Нажмите ✅ чтобы ответить</p></div>');document.getElementById('callAcceptBtn').addEventListener('click',()=>{stopRingtone();closeModal();if(state.pendingCallData){const d=state.pendingCallData;answerCall(d.offer,d.from,d.isVideo||false);state.pendingCallData=null;}});document.getElementById('callRejectBtn').addEventListener('click',()=>{stopRingtone();closeModal();if(state.pendingCallData){const d=state.pendingCallData;if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'call_end',targetUserId:d.from,roomId:d.roomId}));}state.pendingCallData=null;document.getElementById('callContainer').style.display='none';}});setTimeout(()=>{if(state.pendingCallData){stopRingtone();closeModal();const d=state.pendingCallData;if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'call_end',targetUserId:d.from,roomId:d.roomId}));}state.pendingCallData=null;document.getElementById('callContainer').style.display='none';}},30000);}

// ======== СООБЩЕНИЯ ========
function sendMessage(text,videoData,isCircle,fileData,audioData,isSticker,replyTo){const chat=getChat(state.currentChatId);if(!chat||isChatBlocked(chat.id))return;if(!text&&!videoData&&!fileData&&!audioData&&!isSticker)return;const msg={id:generateId(),sender:state.user.id,text:text||'',video:videoData||null,file:fileData||null,audio:audioData||null,isCircle:isCircle||false,isSticker:isSticker||false,isBot:false,isSystem:false,replyTo:replyTo||null,time:Date.now()};chat.messages.push(msg);renderMessages();renderChatList();saveState();clearReplyBar();if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'new_message',chatId:chat.id,sender:state.user.id,msgId:msg.id,text:text||'',video:videoData||null,file:fileData||null,audio:audioData||null,isCircle:isCircle||false,isSticker:isSticker||false,isSystem:false,isBot:false,replyTo:replyTo||null}));}if(chat.isBot&&text&&state.bot){setTimeout(()=>{const response=state.bot.getResponse(text,chat.id);if(response){const botMsg={id:generateId(),sender:'bot',text:response,time:Date.now(),isBot:true,isSystem:false};chat.messages.push(botMsg);renderMessages();renderChatList();saveState();if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'new_message',chatId:chat.id,sender:'bot',msgId:botMsg.id,text:response,isBot:true}));}}},500);}}

function deleteMessage(chatId,msgId){const chat=getChat(chatId);if(chat){chat.messages=chat.messages.filter(m=>m.id!==msgId);if(chat.pinnedMessages){chat.pinnedMessages=chat.pinnedMessages.filter(id=>id!==msgId);}saveState();renderMessages();renderChatList();if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'delete_message',chatId:chatId,msgId:msgId}));}}}

function togglePinMessage(chatId,msgId){const chat=getChat(chatId);if(!chat)return;if(!chat.pinnedMessages)chat.pinnedMessages=[];const index=chat.pinnedMessages.indexOf(msgId);if(index>-1){chat.pinnedMessages.splice(index,1);}else{chat.pinnedMessages.push(msgId);const msg=chat.messages.find(m=>m.id===msgId);if(msg){addSystemMessage(chatId,'📌 Сообщение закреплено: '+(msg.text||'сообщение'));}}saveState();renderMessages();renderChatList();updatePinnedBar();}

function updatePinnedBar(){const chat=getChat(state.currentChatId);const bar=document.getElementById('pinnedBar');const textEl=document.getElementById('pinnedText');if(!chat||!chat.pinnedMessages||chat.pinnedMessages.length===0){bar.classList.remove('show');return;}const pinnedMsg=chat.messages.find(m=>m.id===chat.pinnedMessages[chat.pinnedMessages.length-1]);if(pinnedMsg){textEl.textContent=pinnedMsg.text||'Закреплённое сообщение';bar.classList.add('show');}else{bar.classList.remove('show');}}

function setReplyTo(msg){state.replyToMsg=msg;const bar=document.getElementById('replyBar');document.getElementById('replyAuthor').textContent=getUserName(msg.sender);document.getElementById('replyText').textContent=msg.text||'сообщение';bar.classList.add('show');document.getElementById('messageInput').focus();}
function clearReplyBar(){state.replyToMsg=null;document.getElementById('replyBar').classList.remove('show');}

// ======== RENDER ========
function renderChatList(){const container=document.getElementById('chatList');const uniqueChats=[];const seenIds=new Set();for(const chat of state.chats){if(!seenIds.has(chat.id)){seenIds.add(chat.id);uniqueChats.push(chat);}}state.chats=uniqueChats;let list=state.chats.filter(c=>!c.isBlocked&&!state.deletedChatIds.has(c.id));if(state.currentFolderFilter){const folderChatIds=state.folderChats[state.currentFolderFilter]||[];list=list.filter(c=>folderChatIds.includes(c.id));}list.sort((a,b)=>{const ta=a.messages&&a.messages.length?a.messages[a.messages.length-1].time:0;const tb=b.messages&&b.messages.length?b.messages[b.messages.length-1].time:0;return tb-ta;});container.innerHTML='';if(!list.length){container.innerHTML='<div style="color:#8e9fb1;text-align:center;padding:30px 15px;font-size:13px;">'+(state.currentFolderFilter?'В этой папке нет чатов':'Нет чатов')+(state.currentFolderFilter?'<br><button onclick="showAllChats()" style="background:#2b5278;border:none;border-radius:8px;color:#fff;padding:6px 12px;cursor:pointer;font-size:12px;margin-top:8px;">Показать все чаты</button>':'')+'</div>';return;}list.forEach(chat=>{const div=document.createElement('div');div.className='chat-item';const lastMsg=chat.messages&&chat.messages.length?chat.messages[chat.messages.length-1]:null;let lastText='Нет сообщений';let lastTime='';if(lastMsg){if(lastMsg.isBot)lastText='🤖 '+(lastMsg.text||'');else if(lastMsg.text)lastText=lastMsg.text;else if(lastMsg.video)lastText='🎥 Видео';else if(lastMsg.file)lastText='📎 '+(lastMsg.file.name||'Файл');else if(lastMsg.audio)lastText='🎤 Голосовое';else if(lastMsg.isSticker)lastText='😊 Стикер';else if(lastMsg.isSystem)lastText='📌 '+lastMsg.text;lastTime=formatTime(lastMsg.time);if(lastText.length>30)lastText=lastText.substring(0,30)+'...';}let avatarContent=chat.avatar||chat.name.charAt(0).toUpperCase()||'?';if(chat.avatar&&chat.avatar.startsWith('data:image')){avatarContent='<img src="'+chat.avatar+'" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';}const displayName=getChatName(chat);div.innerHTML='<div class="chat-avatar" style="background:'+(chat.avatarColor||'#2b5278')+'">'+(typeof avatarContent==='string'&&avatarContent.includes('<img')?avatarContent:avatarContent)+(chat.isPrivate?'<span class="private-badge">🔒</span>':'')+(chat.isBlocked?'<span class="blocked-badge">🚫</span>':'')+'</div><div class="chat-info"><div class="chat-name">'+displayName+'</div><div class="chat-last">'+lastText+'</div></div>'+(lastTime?'<div class="chat-time">'+lastTime+'</div>':'')+'<div class="chat-actions"><button class="folder-btn" data-id="'+chat.id+'" title="Добавить в папку">📂</button>'+(chat.type==='channel'||chat.type==='group'?'<button class="invite-btn" data-id="'+chat.id+'" title="Ссылка-приглашение">🔗</button>':'')+(chat.creator===state.user?.id?'<button class="delete-chat-btn danger" data-id="'+chat.id+'" title="Удалить чат">🗑️</button>':'')+(chat.type==='group'?'<button class="block-user-btn" data-id="'+chat.id+'" title="Заблокировать пользователя">🚫</button>':'')+'</div>';div.dataset.id=chat.id;div.addEventListener('dblclick',()=>{renameChat(chat.id);});div.addEventListener('click',()=>openChat(chat.id));container.appendChild(div);});container.querySelectorAll('.folder-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();showAddToFolderMenu(btn.dataset.id);});});container.querySelectorAll('.invite-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();showChatInvite(btn.dataset.id);});});container.querySelectorAll('.delete-chat-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();deleteChat(btn.dataset.id);});});container.querySelectorAll('.block-user-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();showBlockUserModal(btn.dataset.id);});});}

function renderMessages(){const container=document.getElementById('messagesContainer');const chat=getChat(state.currentChatId);if(!chat||isChatBlocked(chat.id)){container.innerHTML=chat&&isChatBlocked(chat.id)?'<div style="color:#f28b82;text-align:center;padding:20px;font-size:14px;">🚫 Чат заблокирован</div>':'';return;}container.innerHTML='';let newMsgAdded=false;(chat.messages||[]).forEach(msg=>{const isBlocked=isUserBlocked(msg.sender);const div=document.createElement('div');const isOwn=msg.sender===state.user?.id;let cls='';if(msg.isBot)cls='bot';else if(isOwn)cls='own';else if(msg.isSystem)cls='system';else cls='other';div.className='msg '+cls+(isBlocked?' blocked':'');if((chat.pinnedMessages||[]).includes(msg.id))div.classList.add('pinned');const isNew=msg._isNew;if(isNew){div.classList.add('new-msg');msg._isNew=false;}let content='';if(msg.replyTo){const repliedMsg=chat.messages.find(m=>m.id===msg.replyTo);if(repliedMsg){const replyAuthor=getUserName(repliedMsg.sender);const replyText=repliedMsg.text||'сообщение';content+='<div class="reply-to"><span class="reply-author">'+replyAuthor+'</span>: <span class="reply-text">'+replyText+'</span></div>';}}if(msg.isSticker&&msg.stickerData){content+='<div class="sticker-msg">'+msg.stickerData+'</div>';}else if(msg.video){const videoClass=msg.isCircle?'circle-video':'';content+='<video src="'+msg.video+'" controls class="'+videoClass+'"></video>';}else if(msg.file&&msg.file.data){const icon=getFileIcon(msg.file.name);const isImage=msg.file.type&&msg.file.type.startsWith('image/');if(isImage)content+='<img src="'+msg.file.data+'" alt="'+msg.file.name+'" />';content+='<div class="file-container" data-file="'+msg.file.data+'" data-filename="'+msg.file.name+'"><span class="file-icon">'+icon+'</span><div class="file-info"><div class="file-name">'+msg.file.name+'</div><div class="file-size">'+formatFileSize(msg.file.size)+'</div></div><button class="download-btn" data-file="'+msg.file.data+'" data-filename="'+msg.file.name+'">⬇</button></div>';}else if(msg.audio&&msg.audio.data){content+='<div class="audio-container" data-audio="'+msg.audio.data+'"><button class="play-btn">▶</button><div class="audio-progress"><div class="audio-fill"></div></div><span class="audio-time">'+formatDuration(msg.audio.duration||0)+'</span></div>';}else if(msg.text){content+=msg.text;}div.innerHTML='<div class="msg-text">'+content+'</div><div class="msg-time">'+formatTime(msg.time)+'</div>';if(!isBlocked&&!msg.isSystem&&isOwn){const actions=document.createElement('div');actions.className='msg-actions';const isPinned=(chat.pinnedMessages||[]).includes(msg.id);actions.innerHTML='<button class="reply-btn" data-msg-id="'+msg.id+'" title="Ответить">↩</button><button class="pin-btn'+(isPinned?' pinned':'')+'" data-msg-id="'+msg.id+'" title="Закрепить">📌</button><button class="delete-btn" data-msg-id="'+msg.id+'" title="Удалить">✕</button>';div.appendChild(actions);}else if(!isBlocked&&!msg.isSystem&&!isOwn){const actions=document.createElement('div');actions.className='msg-actions';actions.innerHTML='<button class="reply-btn" data-msg-id="'+msg.id+'" title="Ответить">↩</button>';div.appendChild(actions);}container.appendChild(div);if(isNew)newMsgAdded=true;});container.querySelectorAll('.reply-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const msgId=btn.dataset.msgId;const msg=chat.messages.find(m=>m.id===msgId);if(msg){setReplyTo(msg);}});});container.querySelectorAll('.pin-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const msgId=btn.dataset.msgId;togglePinMessage(chat.id,msgId);});});container.querySelectorAll('.delete-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const msgId=btn.dataset.msgId;if(confirm('Удалить сообщение?')){deleteMessage(chat.id,msgId);}});});container.querySelectorAll('.audio-container').forEach(el=>{const audioData=el.dataset.audio;const playBtn=el.querySelector('.play-btn');const progressFill=el.querySelector('.audio-fill');const timeEl=el.querySelector('.audio-time');let audio=null;let isPlaying=false;playBtn.addEventListener('click',()=>{if(!audio){audio=new Audio(audioData);audio.addEventListener('timeupdate',()=>{const percent=(audio.currentTime/audio.duration)*100;progressFill.style.width=percent+'%';timeEl.textContent=formatDuration(audio.currentTime);});audio.addEventListener('ended',()=>{isPlaying=false;playBtn.textContent='▶';progressFill.style.width='0%';});}if(isPlaying){audio.pause();playBtn.textContent='▶';isPlaying=false;}else{audio.play();playBtn.textContent='⏸';isPlaying=true;}});const progressBar=el.querySelector('.audio-progress');progressBar.addEventListener('click',(e)=>{if(!audio)return;const rect=progressBar.getBoundingClientRect();const percent=(e.clientX-rect.left)/rect.width;audio.currentTime=percent*audio.duration;});});container.querySelectorAll('.download-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const data=btn.dataset.file;const name=btn.dataset.filename||'file';try{const link=document.createElement('a');link.href=data;link.download=name;document.body.appendChild(link);link.click();document.body.removeChild(link);btn.textContent='✅';setTimeout(()=>{btn.textContent='⬇';},1500);}catch(e){window.open(data,'_blank');}});});container.querySelectorAll('.reply-to').forEach(el=>{el.addEventListener('click',()=>{const replyText=el.querySelector('.reply-text')?.textContent;if(replyText){const msgs=container.querySelectorAll('.msg');for(const m of msgs){const textEl=m.querySelector('.msg-text');if(textEl&&textEl.textContent.includes(replyText)){m.scrollIntoView({behavior:'smooth',block:'center'});m.style.background='#2b5278';setTimeout(()=>{m.style.background='';},2000);break;}}}});});if(newMsgAdded||!container._lastScrollHeight){container.scrollTop=container.scrollHeight;}container._lastScrollHeight=container.scrollHeight;updatePinnedBar();}

// ======== УПРАВЛЕНИЕ ЧАТАМИ ========
async function renameChat(chatId){const chat=getChat(chatId);if(!chat)return;const isPersonal=chat.type==='chat'&&chat.participants&&chat.participants.length===2;let newName=prompt(isPersonal?'Введите новое имя для чата:':'Введите новое название:',chat.name);if(!newName||newName.trim()==='')return;newName=newName.trim();chat.name=newName;chat._customName=newName;saveState();renderChatList();if(state.currentChatId===chatId)updateChatHeader();try{await fetch('/api/chats/'+chat.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newName})});}catch(e){}if(wsConnected&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'update_chat',chatId:chat.id,name:newName}));}}

function deleteChat(chatId){const chat=getChat(chatId);if(!chat||chat.creator!==state.user?.id){alert('❌ Только создатель может удалить');return;}if(!confirm('Удалить "'+chat.name+'"?'))return;state.deletedChatIds.add(chatId);state.chats=state.chats.filter(c=>c.id!==chatId);if(state.currentChatId===chatId)closeChat();saveState();renderChatList();fetch('/api/chats/'+chatId,{method:'DELETE'}).catch(e=>{});alert('✅ Чат удалён');}

async function showChatInvite(chatId){const chat=getChat(chatId);if(!chat)return;if(!chat.inviteCode){chat.inviteCode=generateId();try{await fetch('/api/chats/'+chat.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({inviteCode:chat.inviteCode})});}catch(e){}}const link=window.location.origin+'/?invite='+chat.inviteCode;openModal('🔗 Ссылка-приглашение','<p style="color:#8e9fb1;font-size:13px;margin-bottom:8px;">Ссылка для приглашения в "'+chat.name+'":</p><div style="background:#0e1621;padding:10px;border-radius:8px;display:flex;align-items:center;gap:8px;margin:8px 0;border:1px solid #2b3b4a;"><span style="flex:1;font-size:12px;color:#64b5f6;word-break:break-all;">'+link+'</span><button onclick="navigator.clipboard.writeText(\''+link+'\').then(()=>alert(\'✅ Ссылка скопирована!\'))" style="background:#2b5278;border:none;color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;">📋</button></div><p style="color:#8e9fb1;font-size:11px;margin-top:6px;">Код: <strong>'+chat.inviteCode+'</strong></p><button class="btn-primary" onclick="closeModal()">Готово</button>');}

ait createChat(type,name,[state.user.id],state.user.id,false,desc,selectedAvatar);if(newChat){closeModal();openChat(newChat.id);renderAll();alert('✅ '+typeLabel+' "'+name+'" создан!');}else{alert('❌ Ошибка создания');}});}

async function createChat(type,name,participants,creator,isPrivate,description,avatar){try{let chatName=name||'Чат';if(type==='chat'&&participants&&participants.length===2){const otherId=participants.find(id=>id!==creator);const otherUser=state.allUsers.find(u=>u.id===otherId);if(otherUser){chatName=otherUser.name;}}const response=await fetch('/api/chats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:chatName,type:type||'chat',participants:participants||[creator],creator:creator||state.user?.id,isPrivate:isPrivate||false,description:description||'',avatar:avatar||null})});const newChat=await response.json();newChat.pinnedMessages=[];state.chats.push(newChat);state.lastMessageCount[newChat.id]=0;if(type==='channel'){addSystemMessage(newChat.id,'📢 Канал "'+newChat.name+'" создан!');}else if(type==='group'){addSystemMessage(newChat.id,'👥 Группа "'+newChat.name+'" создана!');}renderChatList();saveState();return newChat;}catch(e){console.error('Create chat error:',e);return null;}}

function startVoiceRecording(){if(state.isRecording)return;const voiceBar=document.getElementById('voiceRecordBar');navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{state.mediaRecorder=new MediaRecorder(stream);state.audioChunks=[];state.isRecording=true;state.recordingSeconds=0;state.mediaRecorder.ondataavailable=(e)=>{if(e.data.size>0)state.audioChunks.push(e.data);};state.mediaRecorder.onstop=()=>{const blob=new Blob(state.audioChunks,{type:'audio/webm'});const reader=new FileReader();reader.onload=(ev)=>{const audioData={data:ev.target.result,duration:state.recordingSeconds};sendMessage(null,null,false,null,audioData,false,state.replyToMsg);state.audioChunks=[];state.isRecording=false;voiceBar.classList.remove('show');document.getElementById('voiceTimer').textContent='0:00';clearInterval(state.recordingTimer);stream.getTracks().forEach(t=>t.stop());};reader.readAsDataURL(blob);};state.mediaRecorder.start();voiceBar.classList.add('show');clearInterval(state.recordingTimer);state.recordingTimer=setInterval(()=>{state.recordingSeconds++;document.getElementById('voiceTimer').textContent=formatDuration(state.recordingSeconds);},1000);}).catch(err=>alert('❌ Ошибка микрофона: '+err.message));}
function stopVoiceRecording(){if(state.mediaRecorder&&state.isRecording)state.mediaRecorder.stop();}
function cancelVoiceRecording(){if(state.mediaRecorder&&state.isRecording){state.mediaRecorder.stop();state.audioChunks=[];state.isRecording=false;document.getElementById('voiceRecordBar').classList.remove('show');document.getElementById('voiceTimer').textContent='0:00';clearInterval(state.recordingTimer);}}

let circleHoldTimer=null;

function startCircleRecording(){const preview=document.getElementById('circlePreview');const recorderDiv=document.getElementById('circleRecorder');const startBtn=document.getElementById('circleStartBtn');const stopBtn=document.getElementById('circleStopBtn');const timerEl=document.getElementById('circleTimer');recorderDiv.style.display='block';document.getElementById('inputRow').style.display='none';if(circleAudioContext){try{circleAudioContext.close();}catch(e){}circleAudioContext=null;}navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:320},height:{ideal:320}},audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}).then(stream=>{state.circleStream=stream;try{circleAudioContext=new(window.AudioContext||window.webkitAudioContext)();const source=circleAudioContext.createMediaStreamSource(stream);const filter=circleAudioContext.createBiquadFilter();filter.type='highpass';filter.frequency.value=80;const compressor=circleAudioContext.createDynamicsCompressor();compressor.threshold.value=-30;compressor.knee.value=20;compressor.ratio.value=8;compressor.attack.value=0.003;compressor.release.value=0.25;const gainNode=circleAudioContext.createGain();gainNode.gain.value=1.5;source.connect(filter);filter.connect(compressor);compressor.connect(gainNode);gainNode.connect(circleAudioContext.destination);const destination=circleAudioContext.createMediaStreamDestination();gainNode.connect(destination);const processedStream=new MediaStream([...stream.getVideoTracks(),...destination.stream.getAudioTracks()]);state.circleStream=processedStream;}catch(e){state.circleStream=stream;}preview.srcObject=state.circleStream;preview.play();startBtn.disabled=false;stopBtn.disabled=true;timerEl.textContent='0 сек';state.circleSeconds=0;state.circleChunks=[];startBtn.onclick=()=>{if(!state.circleStream)return;if(state.circleRecorder&&state.circleRecorder.state!=='inactive'){try{state.circleRecorder.stop();}catch(e){}}state.circleChunks=[];const recorder=new MediaRecorder(state.circleStream,{mimeType:'video/webm;codecs=vp9,opus',audioBitsPerSecond:128000,videoBitsPerSecond:2500000});state.circleRecorder=recorder;state.isRecording=true;recorder.ondataavailable=(e)=>{if(e.data.size>0)state.circleChunks.push(e.data);};recorder.onstop=()=>{const blob=new Blob(state.circleChunks,{type:'video/webm'});if(blob.size>0){const reader=new FileReader();reader.onload=(ev)=>{sendMessage(null,ev.target.result,true,null,null,false,state.replyToMsg);closeCircleRecorder();};reader.readAsDataURL(blob);}else{alert('Запись не удалась');closeCircleRecorder();}state.circleChunks=[];state.isRecording=false;};recorder.start(1000);startBtn.disabled=true;stopBtn.disabled=false;state.circleSeconds=0;clearInterval(state.circleTimer);state.circleTimer=setInterval(()=>{state.circleSeconds++;timerEl.textContent=state.circleSeconds+' сек';if(state.circleSeconds>=5)stopCircleRecording();},1000);};stopBtn.onclick=stopCircleRecording;document.getElementById('circleCancelBtn').onclick=closeCircleRecorder;}).catch(err=>{alert('❌ Ошибка камеры: '+err.message);closeCircleRecorder();});}
function stopCircleRecording(){if(state.circleRecorder&&state.circleRecorder.state!=='inactive'){try{state.circleRecorder.stop();}catch(e){}}clearInterval(state.circleTimer);document.getElementById('circleTimer').textContent='⏹';state.isRecording=false;}
function closeCircleRecorder(){clearInterval(state.circleTimer);if(state.circleRecorder){try{if(state.circleRecorder.state!=='inactive'){state.circleRecorder.stop();}}catch(e){}state.circleRecorder=null;}if(state.circleStream){state.circleStream.getTracks().forEach(track=>{try{track.stop();track.enabled=false;}catch(e){}});state.circleStream=null;}if(circleAudioContext){try{circleAudioContext.close();}catch(e){}circleAudioContext=null;}const preview=document.getElementById('circlePreview');if(preview){preview.srcObject=null;preview.pause();preview.load();}document.getElementById('circleRecorder').style.display='none';document.getElementById('inputRow').style.display='flex';state.circleChunks=[];state.isRecording=false;state.circleSeconds=0;const startBtn=document.getElementById('circleStartBtn');const stopBtn=document.getElementById('circleStopBtn');if(startBtn)startBtn.disabled=false;if(stopBtn)stopBtn.disabled=true;document.getElementById('circleTimer').textContent='0 сек';}

async function sendVerificationCode(){const name=document.getElementById('regUsername').value.trim();const email=document.getElementById('regEmail').value.trim();const phone=document.getElementById('regPhone').value.trim();const password=document.getElementById('regPassword').value.trim();const errorEl=document.getElementById('codeError');const successEl=document.getElementById('codeSuccess');if(!name||!password){errorEl.textContent='Заполните имя и пароль';errorEl.classList.remove('hidden');return;}if(name.length<3){errorEl.textContent='Имя минимум 3 символа';errorEl.classList.remove('hidden');return;}if(password.length<4){errorEl.textContent='Пароль минимум 4 символа';errorEl.classList.remove('hidden');return;}if(!email&&!phone){errorEl.textContent='Укажите почту или телефон';errorEl.classList.remove('hidden');return;}errorEl.classList.add('hidden');state.pendingVerification={name,email,phone,password};try{const response=await fetch('/api/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,password})});const result=await response.json();if(result.error){errorEl.textContent=result.error;errorEl.classList.remove('hidden');return;}const verifyCodeInput=document.getElementById('verifyCode');const displayCode=document.getElementById('displayCode');const codeDisplayBlock=document.getElementById('codeDisplayBlock');if(result.code){verifyCodeInput.value=result.code;if(displayCode){displayCode.textContent=result.code;codeDisplayBlock.style.display='block';}setTimeout(()=>{verifyCode();},1000);}if(!result.code){const localCode=Math.floor(100000+Math.random()*900000).toString();verifyCodeInput.value=localCode;if(displayCode){displayCode.textContent=localCode;codeDisplayBlock.style.display='block';}state._localCode=localCode;setTimeout(()=>{verifyCode();},1000);}let displayMessage='✅ Код создан и показан ниже!';if(result.emailConfigured&&result.message.includes('отправлен')){displayMessage='✅ Код отправлен на почту! Пров // ======== ЗВУКИ ЗВОНКА И PUSH ========
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
let ringtoneBuffer = null;
let ringtoneSource = null;
let isRingtonePlaying = false;

function urlBase64ToUint8Array(base64String) {
    base64String = base64String.trim();
    while (base64String.length % 4 !== 0) {
        base64String += '=';
    }
    base64String = base64String.replace(/-/g, '+').replace(/_/g, '/');
    try {
        const rawData = window.atob(base64String);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    } catch (e) {
        console.error('❌ Ошибка декодирования VAPID ключа:', e);
        const fallback = new Uint8Array(32);
        for (let i = 0; i < 32; i++) {
            fallback[i] = Math.floor(Math.random() * 256);
        }
        return fallback;
    }
}
async function loadRingtone() {
    try {
        const response = await fetch('/zvonok.mp3');
        if (response.ok) {
            const arrayBuffer = await response.arrayBuffer();
            ringtoneBuffer = await audioContext.decodeAudioData(arrayBuffer);
            console.log('✅ Звук звонка загружен');
        } else {
            createFallbackRingtone();
        }
    } catch (error) {
        console.error('❌ Ошибка загрузки звука звонка:', error);
        createFallbackRingtone();
    }
}

function createFallbackRingtone() {
    try {
        const sampleRate = audioContext.sampleRate;
        const duration = 0.5;
        const buffer = audioContext.createBuffer(1, sampleRate * duration, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            const t = i / sampleRate;
            data[i] = Math.sin(2 * Math.PI * 440 * t) * 0.5;
        }
        ringtoneBuffer = buffer;
        console.log('✅ Создан синтетический звук звонка');
    } catch (e) {
        console.error('❌ Ошибка создания звука:', e);
    }
}

function playRingtone() {
    if (!ringtoneBuffer) { loadRingtone().then(() => { if (ringtoneBuffer) playRingtone(); }); return; }
    if (isRingtonePlaying) stopRingtone();
    try {
        ringtoneSource = audioContext.createBufferSource();
        ringtoneSource.buffer = ringtoneBuffer;
        ringtoneSource.connect(audioContext.destination);
        ringtoneSource.loop = true;
        ringtoneSource.start(0);
        isRingtonePlaying = true;
        console.log('🔔 Звонок играет');
    } catch (error) { console.error('❌ Ошибка воспроизведения звонка:', error); }
}

function stopRingtone() {
    if (ringtoneSource) {
        try { ringtoneSource.stop(); ringtoneSource.disconnect(); } catch (e) {}
        ringtoneSource = null;
    }
    isRingtonePlaying = false;
    console.log('🔕 Звонок остановлен');
}

function playRingtoneInBackground() {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'play_sound' });
    }
}

// ======== PUSH-УВЕДОМЛЕНИЯ ========
async function requestNotificationPermission() {
    if (!('Notification' in window)) { console.log('❌ Уведомления не поддерживаются'); return false; }
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') { console.log('❌ Уведомления запрещены'); return false; }
    const permission = await Notification.requestPermission();
    return permission === 'granted';
}

async function subscribeToPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        console.log('❌ Push не поддерживается');
        return;
    }
    try {
        const response = await fetch('/api/vapid-public-key');
        const data = await response.json();
        if (!data.publicKey) {
            console.log('❌ VAPID ключ не получен');
            return;
        }
        const permission = await requestNotificationPermission();
        if (!permission) {
            console.log('❌ Нет разрешения на уведомления');
            return;
        }
        const registration = await navigator.serviceWorker.ready;
        let subscription;
        try {
            const applicationServerKey = urlBase64ToUint8Array(data.publicKey);
            subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: applicationServerKey
            });
        } catch (subError) {
            console.error('❌ Ошибка подписки:', subError);
            subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true
            });
        }
        const subResponse = await fetch('/api/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(subscription)
        });
        const result = await subResponse.json();
        if (subResponse.ok) {
            console.log('✅ Подписка сохранена на сервере:', result);
        } else {
            console.error('❌ Ошибка сохранения подписки:', result);
        }
        return subscription;
    } catch (error) {
        console.error('❌ Ошибка подписки на push:', error);
    }
}

function sendPushNotification(from, roomId, isVideo) {
    if (!('serviceWorker' in navigator)) return;
    fetch('/api/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            type: 'call',
            from: getUserName(from),
            roomId: roomId,
            isVideo: isVideo || false,
            title: '📞 Входящий звонок'
        })
    }).catch(e => console.warn('Ошибка отправки push:', e));
}

// ======== ПРОВЕРКА ПОДПИСКИ НА PUSH ========
async function checkPushSubscription() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        console.log('❌ Push не поддерживается');
        return false;
    }
    try {
        const registration = await navigator.serviceWorker.ready;
        const subscription = await registration.pushManager.getSubscription();
        if (subscription) {
            console.log('✅ Есть активная подписка на push');
            return true;
        } else {
            console.log('❌ Нет активной подписки');
            return false;
        }
    } catch (error) {
        console.error('❌ Ошибка проверки подписки:', error);
        return false;
    }
}

document.addEventListener('DOMContentLoaded', async function() {
    console.log('✅ DOM загружен, инициализация...');
    
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')

                console.error('❌ Ошибка регистрации SW:', err);
            });
    }

    const loaded = loadState();
    loadFolders();
    loadRingtone();
    
    // ======== ВСЕ ОБРАБОТЧИКИ КНОПОК ========
    // Вход
    document.getElementById('loginPasswordBtn').addEventListener('click', loginWithPassword);
    document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') loginWithPassword(); });
    document.getElementById('togglePassword').addEventListener('click', () => {
        const inp = document.getElementById('loginPassword');
        inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    
    // Регистрация
    document.getElementById('sendCodeBtn').addEventListener('click', sendVerificationCode);
    document.getElementById('verifyBtn').addEventListener('click', verifyCode);
    document.getElementById('verifyCode').addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyCode(); });
    document.getElementById('resendCodeBtn').addEventListener('click', resendCode);
    document.getElementById('toggleRegPassword').addEventListener('click', () => {
        const inp = document.getElementById('regPassword');
        inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    
    // Восстановление пароля
    document.getElementById('resetSendBtn').addEventListener('click', sendResetCode);
    document.getElementById('resetVerifyBtn').addEventListener('click', resetPasswordVerify);
    document.getElementById('resetVerifyCode').addEventListener('keydown', (e) => { if (e.key === 'Enter') resetPasswordVerify(); });
    document.getElementById('resetResendBtn').addEventListener('click', resendResetCode);
    document.getElementById('resetConfirmBtn').addEventListener('click', resetPasswordVerify);
    
    // Табы
    document.getElementById('tabPassword').addEventListener('click', () => {
        document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
        document.getElementById('tabPassword').classList.add('active');
        document.getElementById('passwordForm').style.display = 'block';
        document.getElementById('codeForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'none';
    });
    document.getElementById('tabCode').addEventListener('click', () => {
        document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
        document.getElementById('tabCode').classList.add('active');
        document.getElementById('passwordForm').style.display = 'none';
        document.getElementById('codeForm').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
    });
    document.getElementById('forgotPasswordLink').addEventListener('click', () => {
        document.getElementById('passwordForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'block';
        document.getElementById('resetError').classList.add('hidden');
        document.getElementById('resetSuccess').classList.add('hidden');
        document.getElementById('resetVerifySection').style.display = 'none';
        document.getElementById('resetSendBtn').disabled = false;
        document.getElementById('resetSendBtn').textContent = '📧 Отправить код';
    });
    document.getElementById('backToLoginLink').addEventListener('click', () => {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('passwordForm').style.display = 'block';
        document.getElementById('resetError').classList.add('hidden');
        document.getElementById('resetSuccess').classList.add('hidden');
        document.getElementById('resetVerifySection').style.display = 'none';
        document.getElementById('resetSendBtn').disabled = false;
        document.getElementById('resetSendBtn').textContent = '📧 Отправить код';
    });
    document.getElementById('backToPasswordLink').addEventListener('click', () => {
        document.getElementById('codeForm').style.display = 'none';
        document.getElementById('passwordForm').style.display = 'block';
        document.getElementById('verifySection').style.display = 'none';
        document.getElementById('sendCodeBtn').disabled = false;
        document.getElementById('sendCodeBtn').textContent = '📧 Отправить код';
        document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
        document.getElementById('tabPassword').classList.add('active');
    });
    
    // Основные кнопки
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('backBtn').addEventListener('click', closeChat);
    document.getElementById('chatsBtn').addEventListener('click', () => {
        document.getElementById('chatsBtn').classList.add('active');
        closeChat();
    });
    document.getElementById('donateBtn').addEventListener('click', toggleDonate);
    document.getElementById('closeDonate').addEventListener('click', toggleDonate);
    document.getElementById('moreDonate').addEventListener('click', toggleDonate);
    
    // Поиск
    const searchInput = document.getElementById('globalSearchInput');
    searchInput.addEventListener('input', (e) => performGlobalSearch(e.target.value.trim()));
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrap')) document.getElementById('searchResults').classList.remove('show');
    });
    
    // Создание
    document.getElementById('createChannelBtn').addEventListener('click', () => showCreateChatModal('channel'));
    document.getElementById('createGroupBtn').addEventListener('click', () => showCreateChatModal('group'));
    document.getElementById('createFolderBtn').addEventListener('click', () => showCreateFolderModal());
    document.getElementById('settingsBtn').addEventListener('click', showSettings);
    document.getElementById('chatSettingsBtn').addEventListener('click', showChatSettings);
    document.getElementById('chatInviteBtn').addEventListener('click', () => { if (state.currentChatId) showChatInvite(state.currentChatId); });
    document.getElementById('addUserBtn').addEventListener('click', showAddUserModal);
    document.getElementById('chatAvatarBtn').addEventListener('click', handleChatAvatarUpload);
    
    document.getElementById('chatMoreBtn').addEventListener('click', () => {
        const menu = document.getElementById('chatSettingsBtn');
        menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
    });
    
    // Звонки
    document.getElementById('callBtn').addEventListener('click', () => {
        const chat = getChat(state.currentChatId);
        if (!chat) return;
        const otherId = chat.participants?.find(id => id !== state.user.id);
        if (otherId) { startCall(otherId, false); } else { alert('Не найден собеседник'); }
    });
    document.getElementById('videoCallBtn').addEventListener('click', () => {
        const chat = getChat(state.currentChatId);
        if (!chat) return;
        const otherId = chat.participants?.find(id => id !== state.user.id);
        if (otherId) { startCall(otherId, true); } else { alert('Не найден собеседник'); }
    });
    document.getElementById('endCallBtn').addEventListener('click', endCall);
    document.getElementById('toggleMicBtn').addEventListener('click', toggleMic);
    document.getElementById('toggleVideoBtn').addEventListener('click', toggleVideo);
    document.getElementById('replyCancelBtn').addEventListener('click', clearReplyBar);
    
    // Файлы
    document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', (e) => { if (e.target.files.length) handleFileSelect(e.target.files[0]); });
    document.getElementById('cameraBtn').addEventListener('click', handleCamera);
    document.getElementById('cameraInput').addEventListener('change', (e) => {
        if (e.target.files.length) {
            const file = e.target.files[0];
            if (!file.type.startsWith('image/')) { alert('Выберите изображение'); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const fileData = { name: file.name || 'photo.jpg', size: file.size, type: file.type, data: ev.target.result };
                sendMessage(null, null, false, fileData, null, false, state.replyToMsg);
            };
            reader.readAsDataURL(file);
        }
        e.target.value = '';
    });
    document.getElementById('videoBtn').addEventListener('click', handleVideoUpload);
    
    // Кружки
    const circleBtn = document.getElementById('circleBtn');
    circleBtn.addEventListener('mousedown', startCircleHold);
    circleBtn.addEventListener('mouseup', stopCircleHold);
    circleBtn.addEventListener('mouseleave', stopCircleHold);
    circleBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startCircleHold(); });
    circleBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopCircleHold(); });
    
    // Голосовые
    const voiceBtn = document.getElementById('voiceBtn');
    voiceBtn.addEventListener('mousedown', () => { setTimeout(startVoiceRecording, 300); });
    voiceBtn.addEventListener('mouseup', () => { if (state.isRecording) stopVoiceRecording(); });
    voiceBtn.addEventListener('mouseleave', () => { if (state.isRecording) stopVoiceRecording(); });
    voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setTimeout(startVoiceRecording, 300); });
    voiceBtn.addEventListener('touchend', (e) => { e.preventDefault(); if (state.isRecording) stopVoiceRecording(); });
    
    document.getElementById('voiceCancelBtn').addEventListener('click', cancelVoiceRecording);
    document.getElementById('voiceSendBtn').addEventListener('click', stopVoiceRecording);
    
    // Стикеры и меню
    document.getElementById('stickerBtn').addEventListener('click', toggleStickers);
    document.getElementById('moreBtn').addEventListener('click', toggleMoreMenu);
    document.getElementById('moreCamera').addEventListener('click', () => { document.getElementById('moreMenu').classList.remove('show'); handleCamera(); });
    document.getElementById('moreFile').addEventListener('click', () => { document.getElementById('moreMenu').classList.remove('show'); document.getElementById('fileInput').click(); });
    document.getElementById('moreVideo').addEventListener('click', () => { document.getElementById('moreMenu').classList.remove('show'); handleVideoUpload(); });
    
    // Аватар
    document.getElementById('userAvatar').addEventListener('click', () => document.getElementById('avatarInput').click());
    document.getElementById('avatarInput').addEventListener('change', async (e) => {
        if (e.target.files.length) {
            const file = e.target.files[0];
            if (!file.type.startsWith('image/')) { alert('Выберите изображение'); return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const avatarData = ev.target.result;
                state.user.avatarImg = avatarData;
                state.user.avatar = avatarData;
                saveState();
                document.getElementById('avatarText').textContent = '';
                document.getElementById('userAvatar').innerHTML = '<img src="' + avatarData + '" alt="avatar" />';
                await updateUserAvatar(state.user.id, avatarData);
            };
            reader.readAsDataURL(file);
        }
        e.target.value = '';
    });
    
    // Отправка сообщения
    function handleSend() {
        const input = document.getElementById('messageInput');
        if (input.value.trim()) {
            sendMessage(input.value.trim(), null, false, null, null, false, state.replyToMsg);
            input.value = '';
        }
    }
    document.getElementById('sendBtn').addEventListener('click', handleSend);
    document.getElementById('messageInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleSend(); } });
    
    // Модальные окна
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
    
    // ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
            document.getElementById('searchResults').classList.remove('show');
            document.getElementById('descPopup').classList.remove('show');
            document.getElementById('stickerPanel').classList.remove('show');
            document.getElementById('moreMenu').classList.remove('show');
            document.getElementById('donatePanel').classList.remove('show');
            document.getElementById('replyBar').classList.remove('show');
            state.replyToMsg = null;
            if (document.getElementById('chatView').classList.contains('open')) closeChat();
        }
    });

    // Если пользователь уже залогинен
    if (loaded && state.user) {
        state.bot = new SimpleBot();
        state.bot.setUserName(state.user.name);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        await fetchAllUsers();
        await loadChatsFromServer();
        renderFolders();
        renderChatList();
        connectWebSocket();
        checkInviteCode();
        renderStickers();
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(autoRefreshMessages, 3000);
        console.log('✅ Автообновление запущено (каждые 3 секунды)');
    }

    // Push уведомления
    setTimeout(() => {
        requestNotificationPermission();
        if ('serviceWorker' in navigator) { subscribeToPush(); }
    }, 5000);

    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            console.log('📱 Приложение в фоне');
        } else {
            if (isRingtonePlaying && !state.pendingCallData) { stopRingtone(); }
        }
    });
    
    console.log('✅ Все кнопки подключены!');
    console.log('🚀 Utopia загружена!');
});
</script>
